<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenBen2: Temporal Courtyard</title>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
        .perspective-container { perspective: 1200px; transform-style: preserve-3d; }
        
        .roman-mosaic {
            background-image: 
                repeating-linear-gradient(45deg, #2a251a 10px, transparent 10px, transparent 30px, #2a251a 30px, #2a251a 40px),
                repeating-linear-gradient(-45deg, #1a1510 10px, #3a3225 10px, #3a3225 30px, #1a1510 30px, #1a1510 40px);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
        }
        
        .ruin-overlay {
            background: 
                radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 90%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.25"/></svg>');
            background-blend-mode: multiply;
        }

        .neon-glow {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
        }

        .avatar-img { width: 120px; height: auto; object-fit: contain; filter: drop-shadow(0 0 25px rgba(255,255,255,0.15)); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MARBLES = [
            { id: 'psyc', color: 'rgba(0, 50, 255, 1)', glow: 'rgba(50, 100, 255, 0.8)', heightY: -160, label: 'Psychology' },
            { id: 'science', color: 'rgba(0, 200, 100, 1)', glow: 'rgba(50, 255, 150, 0.8)', heightY: -60, label: 'Science' },
            { id: 'math117', color: 'rgba(255, 0, 50, 1)', glow: 'rgba(255, 50, 100, 0.8)', heightY: 20, label: 'Math 117' },
            { id: 'math017', color: 'rgba(255, 150, 0, 1)', glow: 'rgba(255, 200, 50, 0.8)', heightY: 100, label: 'Math 017' },
            { id: 'elective', color: 'rgba(150, 0, 255, 1)', glow: 'rgba(180, 50, 255, 0.8)', heightY: 180, label: 'Elective' },
        ];

        function App() {
            const [isFidgetMode, setIsFidgetMode] = useState(false);
            const [skyState, setSkyState] = useState('night');
            const [baseRadius, setBaseRadius] = useState(130);
            
            const RESTING_SPEED = 0; 
            const FIDGET_DRIFT = 0.05; 

            const isFidgetModeRef = useRef(isFidgetMode);
            const prevFidgetModeRef = useRef(false);
            const lerpRef = useRef(0);
            const masterAngleRef = useRef(0);
            const ringVelocityRef = useRef(RESTING_SPEED);
            const spinDownStartRef = useRef(0);
            const startAngleRef = useRef(0);
            const targetAngleRef = useRef(0);

            useEffect(() => { isFidgetModeRef.current = isFidgetMode; }, [isFidgetMode]);

            const [orbits, setOrbits] = useState(() => 
                MARBLES.map((m, i) => ({
                    ...m,
                    angle: i * 72, 
                    targetOffset: i * 72,
                    radius: 130, 
                    velocity: RESTING_SPEED, 
                    x: 0, y: 0, z: 0, scale: 1,
                    isDragging: false
                }))
            );

            const requestRef = useRef();
            const draggingRef = useRef(null);

            useEffect(() => {
                const updateSize = () => setBaseRadius(Math.min(150, window.innerWidth * 0.35));
                updateSize();
                window.addEventListener('resize', updateSize);
                return () => window.removeEventListener('resize', updateSize);
            }, []);

            const animate = useCallback(() => {
                const now = performance.now();
                const targetLerp = isFidgetModeRef.current ? 1 : 0;
                lerpRef.current += (targetLerp - lerpRef.current) * 0.025; 

                if (!isFidgetModeRef.current && prevFidgetModeRef.current) {
                    setOrbits(currentOrbits => {
                        const totalVelocity = currentOrbits.reduce((sum, o) => sum + (o.velocity || 0), 0);
                        startAngleRef.current = masterAngleRef.current;
                        const sign = totalVelocity >= 0 ? 1 : -1;
                        const extraRotations = Math.min(Math.floor(Math.abs(totalVelocity) / 5), 4) + 1;
                        const baseTarget = sign >= 0 
                            ? Math.ceil(startAngleRef.current / 360) * 360 
                            : Math.floor(startAngleRef.current / 360) * 360;
                        targetAngleRef.current = baseTarget + (extraRotations * 360 * sign);
                        spinDownStartRef.current = now;
                        return currentOrbits;
                    });
                } else if (isFidgetModeRef.current && !prevFidgetModeRef.current) {
                    setOrbits(currentOrbits => currentOrbits.map(o => ({ ...o, velocity: o.velocity === 0 ? FIDGET_DRIFT : o.velocity })));
                }
                prevFidgetModeRef.current = isFidgetModeRef.current;

                if (!isFidgetModeRef.current) {
                    const elapsed = now - spinDownStartRef.current;
                    if (elapsed < 5000) {
                        const easeOut = 1 - Math.pow(1 - (elapsed / 5000), 3);
                        const newMasterAngle = startAngleRef.current + (targetAngleRef.current - startAngleRef.current) * easeOut;
                        ringVelocityRef.current = newMasterAngle - masterAngleRef.current;
                        masterAngleRef.current = newMasterAngle;
                    } else {
                        ringVelocityRef.current = RESTING_SPEED;
                        masterAngleRef.current = targetAngleRef.current;
                    }
                } else {
                    ringVelocityRef.current = RESTING_SPEED; 
                    masterAngleRef.current = (masterAngleRef.current + ringVelocityRef.current) % 360;
                }

                setOrbits((prevOrbits) =>
                    prevOrbits.map((orbit) => {
                        let currentRadius = orbit.radius;
                        let newAngle = orbit.angle;
                        let newVelocity = orbit.velocity;

                        if (isFidgetModeRef.current) {
                            if (!orbit.isDragging) {
                                const radiusMultiplier = Math.pow(baseRadius / Math.max(currentRadius, 30), 2);
                                newAngle = (orbit.angle + newVelocity * radiusMultiplier) % 360;
                            }
                        } else {
                            currentRadius += (baseRadius - currentRadius) * 0.025;
                            const targetAngle = (masterAngleRef.current + orbit.targetOffset) % 360;
                            let diff = targetAngle - orbit.angle;
                            diff = ((diff + 540) % 360) - 180; 
                            const springForce = diff * 0.005; 
                            const dampingForce = (ringVelocityRef.current - newVelocity) * 0.05; 
                            newVelocity += springForce + dampingForce;
                            newAngle = (orbit.angle + newVelocity) % 360;
                        }

                        newAngle = (newAngle + 360) % 360;
                        const rad = (newAngle * Math.PI) / 180;

                        const fidgetX = Math.sin(rad) * currentRadius;
                        const fidgetY = orbit.heightY;
                        const fidgetZ = Math.cos(rad) * currentRadius;
                        const fidgetScale = 1 + (Math.cos(rad) * 0.2); 

                        const landingRadius = 140; 
                        const landingX = Math.cos(rad - Math.PI / 2) * landingRadius;
                        const landingY = Math.sin(rad - Math.PI / 2) * landingRadius;
                        const landingZ = 120; 
                        const landingScale = 1;

                        const x = landingX + (fidgetX - landingX) * lerpRef.current;
                        const y = landingY + (fidgetY - landingY) * lerpRef.current;
                        const z = landingZ + (fidgetZ - landingZ) * lerpRef.current;
                        const scale = landingScale + (fidgetScale - landingScale) * lerpRef.current;

                        return { ...orbit, radius: currentRadius, angle: newAngle, velocity: newVelocity, x, y, z, scale };
                    })
                );
                requestRef.current = requestAnimationFrame(animate);
            }, [baseRadius]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [animate]);

            const handlePointerDownMarble = (e, index) => {
                if (!isFidgetMode) return;
                e.stopPropagation(); 
                e.target.setPointerCapture(e.pointerId); 
                draggingRef.current = { index, lastX: e.clientX, lastY: e.clientY };
                setOrbits(prev => {
                    const next = [...prev];
                    next[index].isDragging = true;
                    next[index].velocity = 0; 
                    return next;
                });
            };

            const handlePointerMove = (e) => {
                if (!isFidgetMode || !draggingRef.current) return;
                const { index, lastX } = draggingRef.current;
                const deltaX = e.clientX - lastX;
                setOrbits((prev) => {
                    const newOrbits = [...prev];
                    const orbit = newOrbits[index];
                    const rad = orbit.angle * (Math.PI / 180);
                    const isFront = Math.cos(rad) > 0;
                    const directionMultiplier = isFront ? 1 : -1;
                    orbit.angle = (orbit.angle + deltaX * directionMultiplier * 0.5) % 360;
                    orbit.radius = Math.max(40, Math.min(window.innerWidth * 0.45, Math.abs(e.clientX - window.innerWidth / 2)));
                    orbit.velocity = deltaX * directionMultiplier * 0.15;
                    return newOrbits;
                });
                draggingRef.current.lastX = e.clientX;
            };

            const handlePointerUp = (e) => {
                if (draggingRef.current) {
                    const { index } = draggingRef.current;
                    e.target.releasePointerCapture(e.pointerId);
                    setOrbits(prev => {
                        const next = [...prev];
                        next[index].isDragging = false;
                        return next;
                    });
                    draggingRef.current = null;
                }
            };

            return (
                <div className="fixed inset-0 overflow-hidden" onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp}>
                    <div className="absolute inset-0 flex flex-col justify-end" style={{ background: 'linear-gradient(to bottom, #010103, #080814, #0d0d1c)' }}>
                        <div className="absolute inset-0 opacity-60" style={{ backgroundImage: 'radial-gradient(1px 1px at 10% 20%, white, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 80% 15%, white, rgba(0,0,0,0))', backgroundSize: '150px 150px' }} />
                        <div className="absolute left-1/2 -translate-x-1/2 top-8 w-20 h-20 rounded-full shadow-[0_0_90px_rgba(255,255,255,0.35)]" style={{ background: 'radial-gradient(circle at 35% 35%, #fff, #d4d4d4 50%, #8a8a8a)' }} />
                        <div className="absolute bottom-0 w-full h-[45%] bg-gradient-to-t from-[#1a1814] to-transparent opacity-80" />
                    </div>

                    <div className="absolute inset-0 perspective-container flex items-center justify-center pointer-events-none">
                        <div className="relative w-full h-full transform-style-3d transition-transform duration-1000" style={{ transform: isFidgetMode ? 'translateZ(-500px) translateY(150px) rotateX(20deg)' : 'translateZ(-150px) translateY(120px) rotateX(35deg)' }}>
                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[250vw] h-[200vh] roman-mosaic">
                                <div className="absolute inset-0 ruin-overlay" />
                                <div className="absolute left-1/2 -translate-x-1/2 top-0 w-32 h-full bg-[#1e1a14] blur-xl opacity-70" />
                            </div>
                        </div>

                        <div className="absolute inset-0 flex items-center justify-center transform-style-3d transition-transform duration-1000" style={{ transform: isFidgetMode ? 'scale(0.8) translateY(-40px) translateX(20px)' : 'scale(1) translateY(-40px) translateX(20px)' }}>
                            <div className="absolute transition-all duration-1000 flex items-center justify-center" style={{ transform: 'translateZ(0px)', opacity: isFidgetMode ? 0.4 : 1 }}>
                                <img src="Avatar.png" alt="Center Avatar" className="avatar-img" onError={(e) => { e.target.style.display='none'; e.target.parentElement.innerHTML='<div class="w-24 h-24 bg-gray-500 rounded-full animate-pulse border-4 border-white opacity-50 shadow-[0_0_20px_white]"></div>'; }} />
                            </div>
                            {orbits.map((orbit, index) => (
                                <div key={orbit.id} onPointerDown={(e) => handlePointerDownMarble(e, index)} className="absolute rounded-full pointer-events-auto" style={{ width: '64px', height: '64px', cursor: isFidgetMode ? 'grab' : 'default', transform: `translate(-50%, -50%) translate3d(${orbit.x}px, ${orbit.y}px, ${orbit.z}px) scale(${orbit.scale})`, background: `radial-gradient(circle at 35% 25%, #fff 5%, ${orbit.color} 45%, #050505 95%)`, boxShadow: `0 0 25px 2px ${orbit.glow}, inset -8px -8px 20px rgba(0,0,0,0.9)`, transformStyle: 'preserve-3d', zIndex: 1000 + Math.round(orbit.z) }} />
                            ))}
                        </div>
                    </div>

                    <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-50">
                        <button onClick={() => setIsFidgetMode(!isFidgetMode)} className="p-4 rounded-full transition-all duration-300 active:scale-90 hover:brightness-125 focus:outline-none">
                            <svg width="40" height="50" viewBox="0 0 100 120" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={`neon-glow transition-opacity duration-300 ${isFidgetMode ? 'opacity-50' : 'opacity-100'}`}>
                                <path d="M 25,100 L 15,100 C 10,100 10,90 10,90 C 10,65 30,55 35,50 C 35,45 25,35 35,25 C 40,20 60,20 65,25 C 75,35 65,45 65,50 C 70,55 90,65 90,90 C 90,90 90,100 85,100 L 75,100" />
                                <path d="M 35,100 L 65,100" /> 
                                <circle cx="50" cy="35" r="14" /> 
                                <circle cx="38" cy="25" r="4" /> 
                                <circle cx="62" cy="25" r="4" /> 
                                <ellipse cx="50" cy="39" rx="5" ry="3" /> 
                                <path d="M 25,85 Q 30,95 40,90" />
                                <path d="M 75,85 Q 70,95 60,90" />
                            </svg>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
